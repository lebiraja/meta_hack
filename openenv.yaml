name: customer-support-env
version: "2.2.0"
description: >
  Hierarchical multi-agent RL environment for AI customer support training.
  Features a 3-level agent hierarchy (Support Agent → Supervisor → Manager),
  LLM-driven customer simulator with Hinglish support, dynamic policy drift,
  hybrid dense rewards (rule-based + LLM-as-Judge), an in-memory DB across
  three domains (food delivery, e-commerce, ticket booking) with grounded
  response rewards + hallucination penalties, and a progressive 5-stage
  curriculum that systematically increases complexity for RL training.
  Backward compatible with Round 1 single-agent tasks.
author: Team X-Force
curriculum:
  description: >
    Progressive 5-stage curriculum designed for RL training. Easy tasks provide
    dense initial rewards so models learn basic behavior. Each subsequent level
    introduces new agents, mechanisms, and challenges. Agents trained on lower
    levels transfer skills upward — empathy from L1-only → oversight from L2 →
    coordination from full hierarchy → adversarial resilience from nightmare →
    DB-grounded reasoning from multi_domain.
  stages:
    - stage: 1
      task: curriculum_basic
      objective: "Learn empathy, info-gathering, and resolution fundamentals"
      advance_threshold: 0.65
    - stage: 2
      task: curriculum_supervisor
      objective: "Learn to accept feedback and improve actions iteratively"
      advance_threshold: 0.60
    - stage: 3
      task: curriculum_full_hierarchy
      objective: "Coordinate across all 3 levels under policy drift"
      advance_threshold: 0.55
    - stage: 4
      task: curriculum_nightmare
      objective: "Handle extreme adversarial conditions with Hinglish, multi-drift, and high frustration"
      advance_threshold: 0.50
    - stage: 5
      task: multi_domain
      objective: "Query a DB for real user/order data, cite grounded facts verbatim, avoid hallucination"
      advance_threshold: null   # final stage — no further advancement
tasks:
  # ── Round 1: Single-agent tasks (backward compatible) ──────────────────────
  - name: easy
    description: Single-turn FAQ resolution (billing — refunds, double charges, invoice errors)
    max_steps: 5
    difficulty: 1
  - name: medium
    description: Multi-turn complaint handling (technical and account issues requiring info gathering)
    max_steps: 8
    difficulty: 2
  - name: hard
    description: SLA-critical escalation triage (enterprise outages, security incidents — agent must escalate within 2 steps)
    max_steps: 10
    difficulty: 3
  - name: nightmare
    description: Multi-issue tickets requiring prioritisation (e.g. Account locked AND unauthorized charge)
    max_steps: 12
    difficulty: 4
  # ── Round 2: Hierarchical multi-agent tasks ─────────────────────────────────
  - name: hierarchy_easy
    description: >
      Hierarchical: Support Agent handles billing FAQ. Supervisor reviews and
      approves. No manager needed. Tests basic hierarchy flow.
    max_steps: 8
    difficulty: 2
  - name: hierarchy_medium
    description: >
      Hierarchical: Support Agent handles technical issue. Supervisor may
      give feedback or request corrections. Mid-episode policy drift possible.
      Tests supervisor oversight quality and agent adaptability.
    max_steps: 12
    difficulty: 3
  - name: hierarchy_hard
    description: >
      Hierarchical: Critical SLA breach requiring all 3 levels. Support Agent
      must recognize urgency, Supervisor must escalate to Manager, Manager
      makes final decision. Schema drift guaranteed. Indian enterprise context.
    max_steps: 15
    difficulty: 4
  # ── Round 2: Progressive Curriculum Tasks ───────────────────────────────────
  - name: curriculum_basic
    description: >
      Stage 1/4 — Support Agent Only. Simple UPI billing queries (₹499 plan,
      GST invoices). No supervisor, no drift, no Hinglish. Customer is polite.
      Goal: learn empathy, info-gathering, and clean resolution in 5 steps.
      Dense rewards ensure the model gets positive signal from day one.
    max_steps: 6
    difficulty: 1
    active_levels: [1]
    drift_probability: 0.0
    initial_frustration: 0.0
    hinglish_enabled: false
  - name: curriculum_supervisor
    description: >
      Stage 2/4 — Support Agent + Supervisor. Medium-priority technical issues
      (payment gateway timeouts, KYC document rejections). Supervisor reviews
      every L1 action, may give feedback requiring L1 to adjust. No manager.
      Low drift probability (20%). Customer may be impatient.
      Goal: learn to incorporate feedback and iterate on responses.
    max_steps: 10
    difficulty: 2
    active_levels: [1, 2]
    drift_probability: 0.2
    initial_frustration: 0.2
    hinglish_enabled: false
  - name: curriculum_full_hierarchy
    description: >
      Stage 3/4 — Full 3-Level Hierarchy. High-priority SLA-critical incidents
      (unauthorized ₹2.5L transactions, production API outages at 10K RPM).
      All three levels must coordinate: L1 recognizes urgency, L2 evaluates and
      escalates, L3 makes authoritative resolution. Policy drift guaranteed.
      Customer persona is impatient. Indian enterprise context throughout.
      Goal: learn multi-agent coordination and policy-adaptive behavior.
    max_steps: 14
    difficulty: 3
    active_levels: [1, 2, 3]
    drift_probability: 0.8
    initial_frustration: 0.4
    hinglish_enabled: false
  - name: curriculum_nightmare
    description: >
      Stage 4/4 — Extreme Adversarial. Multiple simultaneous crises (Diwali
      sale meltdown: payment gateway down + inventory sync broken + CEO
      escalation). Customer starts at high frustration and degrades into
      Hinglish. Multiple policy drifts guaranteed. Requires all 3 levels,
      rapid escalation, and adaptive behavior under changing constraints.
      Rewards are sparse and penalties are harsh — only well-trained agents
      from stages 1-3 can reliably score above 0.5 here.
      Goal: test adversarial resilience, Hinglish comprehension, multi-drift
      adaptation, and full hierarchy under extreme pressure.
    max_steps: 18
    difficulty: 4
    active_levels: [1, 2, 3]
    drift_probability: 1.0
    initial_frustration: 0.7
    hinglish_enabled: true
  - name: multi_domain
    description: >
      Multi-domain DB task — agent must use query_user_profile / query_order_details
      to look up real customer and order data before responding. Tests grounded
      response generation across food_delivery, e_commerce, and ticket_booking domains.
      Rewards grounded citations and penalises hallucinated facts.
      Primary demo target for before/after training comparison on DB usage.
    max_steps: 8
    difficulty: 2
    active_levels: [1]
    drift_probability: 0.0
    initial_frustration: 0.1
    hinglish_enabled: false
action_space:
  type: ActionType
  values:
    # L1 Support Agent
    - respond
    - escalate
    - close
    - request_info
    # L1 DB queries (internal, no customer reply)
    - query_user_profile
    - query_order_details
    # L2 Supervisor
    - supervisor_approve
    - supervisor_reject
    - supervisor_feedback
    - supervisor_escalate
    # L3 Manager
    - manager_override
    - manager_resolve
    - manager_send_back
observation_space:
  session_id: string
  ticket_id: string
  category: string
  priority: "low | medium | high | critical"
  subject: string
  conversation_history: "list[{role: customer|agent|supervisor|manager|system, content: string}]"
  customer_sentiment: "float in [-1.0, 1.0]"
  mood_trajectory: "list[float]"
  unresolved_issues: "list[string]"
  step: int
  max_steps: int
  is_done: bool
  task: string
  retrieved_data: "dict{users: dict{email: user_record|'not_found'}, orders: dict{order_id: order_record|'not_found'}}"
  # Hierarchy fields (Round 2)
  active_role: "support_agent | supervisor | manager"
  supervisor_feedback: "string | null"
  manager_directive: "string | null"
  environment_event: "string | null"
  policy_context: string
  escalation_chain: "list[string]"
  hierarchy_state:
    support_agent_actions: int
    supervisor_reviews: int
    manager_interventions: int
    current_phase: string
    escalation_reason: "string | null"
reward_range: [0.0, 1.0]
reward_signals:
  # Single-agent mode (Round 1)
  resolution: 0.40            # keyword-grounded resolution score on terminal
  tone: 0.20                  # VADER sentiment on agent messages
  efficiency: 0.20            # steps_used vs max_steps
  accuracy: 0.20              # required_info_before_close found in conversation
  # Hierarchy mode (Round 2, overall weights sum to 1.0 at terminal step)
  empathy: "LLM-as-Judge"              # 0.15 weight
  policy_adherence: "LLM-as-Judge"     # 0.15 weight
  oversight_quality: "LLM-as-Judge"    # supervisor role_reward input
  decision_quality: "LLM-as-Judge"     # manager role_reward input
  hierarchy_effectiveness: "Rule-based"# 0.10 weight
  sla_compliance: "Rule-based"         # 0.15 weight
  # DB grounding signals (Round 2, multi_domain task)
  query_match_bonus: "+0.08"           # queried the ticket's email/order
  wasted_query_penalty: "-0.08"        # queried something the customer never mentioned
  grounded_response_bonus: "+0.10"     # cited verbatim DB data in a substantive reply (≥30 chars)
  not_found_handling_bonus: "+0.08"    # responded to a not_found with REQUEST_INFO / ESCALATE
  hallucination_penalty: "-0.25"       # invented a fact (amount/date/email/order) not in DB or customer text
  # Anti-gaming penalties (apply across all tasks)
  loop_penalty: "-0.12"                # any pair of the last 4 agent messages >80% similar
  keyword_stuffing_penalty: "-0.30"    # reward-keyword density >20% without substance
  contradiction_penalty: "-0.15"       # claimed resolution then asked for info
  escalation_penalty: "-0.30"          # escalated a low/medium priority ticket
  ignored_feedback_penalty: "-0.15"    # L1 did not incorporate supervisor feedback
  unnecessary_manager_penalty: "-0.20" # L2 escalated to L3 on a low/medium ticket
reward_clamping:
  db_total: "[-0.30, +0.25]"           # sum of all DB signals is clamped before joining raw
  raw_to_value: "[0.0, 1.0]"           # final Reward.value is always clamped to [0,1]
tags:
  - customer-support
  - multi-agent
  - hierarchical
  - nlp
  - multi-turn
  - real-world
  - rl-environment
  - openenv
  - llm-as-judge
  - indian-enterprise
  - hinglish
  - policy-drift
  - progressive-curriculum
  - meta-hackathon
endpoints:
  reset: "POST /reset?task={task_name}"
  step: "POST /step?session_id={id}"
  state: "GET /state/{session_id}"
  health: "GET /health"
  benchmark: "POST /benchmark"
  leaderboard: "GET /leaderboard"
  leaderboard_submit: "POST /leaderboard/submit"
  replay: "GET /replay/{session_id}"
